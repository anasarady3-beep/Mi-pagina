<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Círculo rojo con borde blanco -->
  <circle cx="100" cy="100" r="95" fill="#d9534f" stroke="white" stroke-width="5"/>
  
  <!-- Pan superior (tostado) -->
  <ellipse cx="100" cy="70" rx="35" ry="20" fill="#8B6F47"/>
  <path d="M 65 70 Q 65 50 100 50 Q 135 50 135 70" fill="#A0826D"/>
  
  <!-- Lechuga -->
  <path d="M 70 75 Q 65 78 68 85 Q 75 82 80 85 Q 85 80 90 85 Q 95 80 100 85 Q 105 80 110 85 Q 115 80 120 85 Q 125 82 130 85 Q 133 78 130 75 Z" fill="#2d5016"/>
  
  <!-- Queso -->
  <rect x="70" y="85" width="60" height="8" fill="#FFD700" rx="2"/>
  
  <!-- Bacon -->
  <path d="M 75 93 Q 80 95 85 93 Q 90 95 95 93 Q 100 95 105 93 Q 110 95 115 93 Q 120 95 125 93" stroke="#c41e3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Carne -->
  <rect x="70" y="101" width="60" height="12" fill="#8B4513" rx="2"/>
  
  <!-- Pan inferior (tostado) -->
  <ellipse cx="100" cy="125" rx="35" ry="18" fill="#8B6F47"/>
  <path d="M 65 125 Q 65 140 100 142 Q 135 140 135 125" fill="#A0826D"/>
  
  <!-- Texto "Zuriel's jr" alrededor del círculo (usando path para texto curvo) -->
  <defs>
    <path id="circlePath" d="M 30, 100 A 70, 70 0 0, 1 170, 100" fill="none"/>
  </defs>
  <text font-size="18" font-weight="bold" fill="white" font-family="Arial, sans-serif" letter-spacing="2">
    <textPath href="#circlePath" startOffset="50%" text-anchor="middle">
      ZURIEL'S JR
    </textPath>
  </text>
</svg>
